<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FNAF Menu</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    background:black;
    color:#e6e6e6;
    font-family:"Courier New", monospace;
    overflow:hidden;
    height:100vh;
    filter: contrast(1.2) brightness(0.85);
    animation:screenFlicker 3s infinite;
}

/* STATIC */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
    opacity:.35;
    animation:noise .12s infinite;
    pointer-events:none;
}

@keyframes noise{
    0%{transform:translate(0,0)}
    50%{transform:translate(-3px,3px)}
    100%{transform:translate(3px,-3px)}
}

/* SCANLINES + VIGNETTE */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.06) 0px,
        rgba(255,255,255,.06) 1px,
        transparent 1px,
        transparent 3px
    );
    box-shadow: inset 0 0 220px rgba(0,0,0,0.95);
    pointer-events:none;
}

/* SCREEN FLICKER */
@keyframes screenFlicker{
    0%,100%{opacity:1}
    92%{opacity:.9}
    96%{opacity:.75}
}

/* RGB SPLIT GLITCH */
.rgb{
    position:fixed;
    inset:0;
    mix-blend-mode:screen;
    pointer-events:none;
    opacity:0;
}

/* TEAR LINE */
.tear{
    position:fixed;
    left:0;
    width:100%;
    height:2px;
    background:white;
    opacity:0;
    pointer-events:none;
}

/* BLACKOUT */
.black{
    position:fixed;
    inset:0;
    background:black;
    opacity:0;
    pointer-events:none;
}

/* LEFT TEXT */
.left{position:absolute;left:80px;top:80px}
.title{font-size:48px;line-height:1.1;margin-bottom:40px}
.menu div{font-size:28px;margin:12px 0}
.selector{position:absolute;left:-30px}

/* IMAGE */
.flicker-container{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:flex-end;
    align-items:center;
}

.img{position:absolute;right:0;height:100%;object-fit:contain}
.scare{opacity:0}
/* ===== TEXT GLITCH EFFECT ===== */
.glitch {
    position: relative;
    animation: glitch-skew 0.2s infinite;
}

.glitch::before,
.glitch::after {
    content: attr(data-text);
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    overflow: hidden;
}

.glitch::before {
    color: red;
    z-index: -1;
    animation: glitch-left 0.15s infinite;
}

.glitch::after {
    color: blue;
    z-index: -2;
    animation: glitch-right 0.15s infinite;
}

@keyframes glitch-left {
    0% {transform: translate(-1px, 0);}
    50% {transform: translate(2px, -1px);}
    100% {transform: translate(-1px, 1px);}
}

@keyframes glitch-right {
    0% {transform: translate(1px, 0);}
    50% {transform: translate(-2px, 1px);}
    100% {transform: translate(1px, -1px);}
}

@keyframes glitch-skew {
    0% {transform: skew(0deg);}
    50% {transform: skew(2deg);}
    100% {transform: skew(0deg);}
}
/* ===== FULL SCREEN GLITCH ===== */
.full-glitch{
    position:fixed;
    inset:0;
    pointer-events:none;
    mix-blend-mode:screen;
    opacity:0;
    background:
        repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,0.08) 0px,
            rgba(255,255,255,0.08) 1px,
            transparent 1px,
            transparent 3px
        );
    animation: fullGlitchAnim 0.15s linear infinite;
}

@keyframes fullGlitchAnim{
    0%{ transform: translate(0,0) skew(0deg); }
    25%{ transform: translate(-6px,3px) skew(1deg); }
    50%{ transform: translate(5px,-4px) skew(-1deg); }
    75%{ transform: translate(-3px,2px) skew(0.5deg); }
    100%{ transform: translate(0,0) skew(0deg); }
}

</style>
</head>

<body>

<div class="left">
<div class="title">Five<br>Nights<br>at<br>Epstein's</div>
<div class="menu">
<div id="new" class="glitch" data-text=">> New Game">>> New Game</div>
<div id="continue" class="glitch" data-text="Continue">Continue</div>
</div>
</div>

<div class="flicker-container">
<img src="Epstein-modified.png" class="img" id="normal">
<img src="Scary.png" class="img scare" id="scare">
</div>

<div class="rgb" id="rgb"></div>
<div class="tear" id="tear"></div>
<div class="black" id="black"></div>

<script>
let selected=0;
const items=["new","continue"];
function updateMenu(){
items.forEach((id,i)=>{
const el=document.getElementById(id);

// remove >> if exists
let text = el.innerText.replace(">> ","");

// add >> to selected
let newText = (i===selected?">> ":"") + text;

el.innerText = newText;
el.setAttribute("data-text", newText);
});
}
document.addEventListener("keydown",e=>{
if(e.key==="ArrowDown")selected=(selected-1+2)%2;
if(e.key==="ArrowUp")selected=(selected+1)%2;
if(e.key==="Enter")alert(selected===0?"Starting...":"No save");
updateMenu();
});
updateMenu();

const scare=document.getElementById("scare");
const normal=document.getElementById("normal");
const rgb=document.getElementById("rgb");
const tear=document.getElementById("tear");
const black=document.getElementById("black");

function glitch(){

// MAIN SCARE FLASH
if(Math.random()<0.25){
scare.style.opacity=1;
normal.style.opacity=0;
document.body.style.transform=`translate(${(Math.random()-0.5)*18}px, ${(Math.random()-0.5)*18}px)`;
setTimeout(()=>{
scare.style.opacity=0;
normal.style.opacity=1;
document.body.style.transform="translate(0,0)";
},120);
}

// RGB SPLIT
if(Math.random()<0.3){
rgb.style.opacity=0.15;
rgb.style.filter=`blur(2px)`;
setTimeout(()=>rgb.style.opacity=0,80);
}

// TEAR LINE
if(Math.random()<0.2){
tear.style.top=Math.random()*window.innerHeight+"px";
tear.style.opacity=0.7;
setTimeout(()=>tear.style.opacity=0,60);
}

// RANDOM BLACKOUT FRAME
if(Math.random()<0.08){
black.style.opacity=1;
setTimeout(()=>black.style.opacity=0,40);
}

}

setInterval(glitch,90);
</script>

</body>
</html>
